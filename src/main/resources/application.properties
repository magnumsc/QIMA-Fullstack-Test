spring.application.name=qima-fullstack-interview-demo

spring.datasource.url=jdbc:postgresql://localhost:5432/qima_fullstack_interview
spring.jpa.properties.hibernate.default_schema=qima_interview
spring.datasource.username=userModel
spring.datasource.password=pass
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

auth.cookie.secret=xxx

spring.jpa.show-sql=false
